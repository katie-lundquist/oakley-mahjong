// Convert a sheet row to a hand object
function rowToHand(row, rowIndex) {
  return {
    id: String(rowIndex),
    rowIndex: rowIndex,
    timestamp: row[0] || "",
    season: row[1] || "",
    winner: row[2] || "",
    players: [
      { name: row[3] || "", score: row[4] || "" },
      { name: row[5] || "", score: row[6] || "" },
      { name: row[7] || "", score: row[8] || "" },
      { name: row[9] || "", score: row[10] || "" },
    ],
    notes: row[11] || "",
  };
}

// Convert a hand object to a sheet row
function handToRow(hand, season) {
  if (!hand || !hand.players || !Array.isArray(hand.players)) {
    console.error("handToRow received invalid hand:", hand);
    return null;
  }
  return [
    hand.timestamp,
    season,
    hand.winner,
    hand.players[0]?.name || "",
    hand.players[0]?.score || "",
    hand.players[1]?.name || "",
    hand.players[1]?.score || "",
    hand.players[2]?.name || "",
    hand.players[2]?.score || "",
    hand.players[3]?.name || "",
    hand.players[3]?.score || "",
    hand.notes || "",
  ];
}

async function fetchAllHands() {
  const resp = await fetch(WORKER_URL);
  const data = await resp.json();
  const rows = data.values || [];
  // Skip header row (index 0), convert remaining rows
  const hands = [];
  for (let i = 1; i < rows.length; i++) {
    if (rows[i] && rows[i][0]) {
      hands.push(rowToHand(rows[i], i));
    }
  }
  return hands;
}

async function appendHand(hand, season) {
  const row = handToRow(hand, season);
  if (!row) { console.error("appendHand: invalid row, skipping"); return; }
  const resp = await fetch(WORKER_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ action: "append", row }),
  });
  return resp.json();
}

async function updateHand(hand, season) {
  const row = handToRow(hand, season);

  const resp = await fetch(WORKER_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      action: "update",
      rowIndex: hand.rowIndex,
      row,
    }),
  });

  if (!resp.ok) {
    const error = await resp.json().catch(() => ({}));
    throw new Error(error.error || "Unable to update hand");
  }

  return resp.json();
}

async function deleteHand(rowIndex) {
  const resp = await fetch(WORKER_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ action: "delete", rowIndex }),
  });
  return resp.json();
}


function computeLeaderboard(hands) {
  const stats = {};
  for (const h of hands) {
    for (const p of h.players) {
      if (!p.name) continue;
      if (!stats[p.name]) stats[p.name] = { name: p.name, totalScore: 0, scoringHands: 0, mahjongs: 0, totalHands: 0 };
      stats[p.name].totalHands++;
      if (h.winner !== "Dead hand") {
        stats[p.name].scoringHands++;
        stats[p.name].totalScore += Number(p.score) || 0;
        if (h.winner === p.name) stats[p.name].mahjongs++;
      }
    }
  }

  const players = Object.values(stats);
  for (const p of players) {
    p.avgScore = p.scoringHands > 0 ? p.totalScore / p.scoringHands : 0;
    p.mahjongRate = p.scoringHands > 0 ? p.mahjongs / p.scoringHands : 0;
  }

  // A player is ranked after 3 total hands, including at least 1 scoring hand.
  const ranked = players.filter(p => p.totalHands >= 3 && p.scoringHands >= 1);
  const notRanked = players.filter(p => p.totalHands > 0 && (p.totalHands < 3 || p.scoringHands === 0));

  const rankBy = (arr, key, asc) => {
    const sorted = [...arr].sort((a, b) => asc ? a[key] - b[key] : b[key] - a[key]);
    let rank = 1;
    for (let i = 0; i < sorted.length; i++) {
      if (i > 0 && sorted[i][key] !== sorted[i-1][key]) rank = i + 1;
      sorted[i][key + "Rank"] = rank;
    }
  };

  rankBy(ranked, "avgScore", false);
  rankBy(ranked, "mahjongRate", false);
  for (const p of ranked) p.combinedScore = p.avgScoreRank + p.mahjongRateRank;

  const sortedRanked = [...ranked].sort((a, b) => a.combinedScore - b.combinedScore);
  let overallRank = 1;
  for (let i = 0; i < sortedRanked.length; i++) {
    if (i > 0 && sortedRanked[i].combinedScore !== sortedRanked[i-1].combinedScore) overallRank = i + 1;
    sortedRanked[i].overallRank = overallRank;
  }

  const sortedNotRanked = [...notRanked].sort((a, b) => {
    const aNeedsScoring = a.totalHands >= 3 && a.scoringHands === 0;
    const bNeedsScoring = b.totalHands >= 3 && b.scoringHands === 0;
    if (aNeedsScoring !== bNeedsScoring) return aNeedsScoring ? -1 : 1;
    if (a.totalHands !== b.totalHands) return b.totalHands - a.totalHands;
    return a.name.localeCompare(b.name);
  });

  return { ranked: sortedRanked, notRanked: sortedNotRanked };
}

function computeSummary(hands) {
  const scoring = hands.filter(h => h.winner !== "Dead hand");
  const dates = [...new Set(hands.map(h => h.timestamp.split("T")[0]))];
  let highScore = 0, totalPoints = 0;
  for (const h of scoring) for (const p of h.players) { const s = Number(p.score) || 0; if (s > highScore) highScore = s; totalPoints += s; }
  return { totalHands: hands.length, scoringHands: scoring.length, gameDays: dates.length, highScore, totalPoints };
}

function exportCSV(hands, season) {
  const esc = c => '"' + String(c).replace(/"/g, '""') + '"';
  const header = ["Timestamp","Winner","P1 Name","P1 Score","P2 Name","P2 Score","P3 Name","P3 Score","P4 Name","P4 Score","Notes"];
  const rows = hands.map(h => [h.timestamp, h.winner, h.players[0]?.name||"", h.players[0]?.score||"", h.players[1]?.name||"", h.players[1]?.score||"", h.players[2]?.name||"", h.players[2]?.score||"", h.players[3]?.name||"", h.players[3]?.score||"", h.notes||""]);
  const csv = [header, ...rows].map(r => r.map(esc).join(",")).join("\n");
  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "oakley-mahjong-" + season + ".csv"; a.click();
  URL.revokeObjectURL(url);
}

function PinModal({ onSuccess, onCancel }) {
  const [val, setVal] = useState("");
  const [err, setErr] = useState(false);
  const submit = () => { if (val === ADMIN_PIN) { onSuccess(); } else { setErr(true); setVal(""); } };

  useEffect(() => {
    const onKeyDown = e => { if (e.key === "Escape") onCancel(); };
    window.addEventListener("keydown", onKeyDown);
    return () => window.removeEventListener("keydown", onKeyDown);
  }, [onCancel]);

  return (
    <div style={S.overlay} role="presentation" onMouseDown={e => { if (e.target === e.currentTarget) onCancel(); }}>
      <div style={S.modal} role="dialog" aria-modal="true" aria-labelledby="admin-modal-title">
        <h3 id="admin-modal-title" style={S.modalTitle}>Admin Access</h3>
        <p style={S.modalSub}>Enter PIN to continue</p>
        <input type="password" maxLength={4} value={val}
          onChange={e => { setVal(e.target.value); setErr(false); }}
          onKeyDown={e => e.key === "Enter" && submit()}
          style={{ ...S.pinInput, borderColor: err ? "#e53e3e" : "#a8bcd8" }}
          autoFocus placeholder="****" />
        {err && <p style={S.pinErr}>Incorrect PIN</p>}
        <div style={S.modalBtns}>
          <button style={S.btnSec} onClick={onCancel}>Cancel</button>
          <button style={S.btnPri} onClick={submit}>Enter</button>
        </div>
      </div>
    </div>
  );
}

function copyAppLink() {
  if (navigator.clipboard && window.isSecureContext) {
    return navigator.clipboard.writeText(APP_URL);
  }
  window.prompt("Copy this link:", APP_URL);
  return Promise.resolve();
}

function ShareCard() {
  const [copied, setCopied] = useState(false);
  const copy = async () => {
    await copyAppLink();
    setCopied(true);
    setTimeout(() => setCopied(false), 1800);
  };

  return (
    <div style={S.shareCard}>
      <div style={S.shareTitle}>Share the Mahjong Cup</div>
      <img src={QR_IMAGE} alt="QR code for the Oakley Family Mahjong Cup" style={S.qrCardImage} />
      <button style={S.btnSec} onClick={copy} aria-label="Copy the Oakley Family Mahjong Cup link">
        {copied ? "Link copied!" : "Copy link"}
      </button>
    </div>
  );
}

function ShareModal({ onClose }) {
  const [copied, setCopied] = useState(false);
  const closeBtnRef = React.useRef(null);
  const canNativeShare = typeof navigator.share === "function";

  useEffect(() => {
    closeBtnRef.current?.focus();
    const onKeyDown = e => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", onKeyDown);
    return () => window.removeEventListener("keydown", onKeyDown);
  }, [onClose]);

  const copy = async () => {
    await copyAppLink();
    setCopied(true);
    setTimeout(() => setCopied(false), 1800);
  };

  const share = async () => {
    try {
      await navigator.share({ title: "Oakley Family Mahjong Cup", url: APP_URL });
    } catch (e) {
      if (e.name !== "AbortError") await copy();
    }
  };

  return (
    <div style={S.overlay} role="presentation" onMouseDown={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div style={{ ...S.modal, textAlign: "center" }} role="dialog" aria-modal="true" aria-labelledby="share-modal-title">
        <h3 id="share-modal-title" style={S.modalTitle}>Share the Mahjong Cup</h3>
        <img src={QR_IMAGE} alt="QR code for the Oakley Family Mahjong Cup" style={S.qrModalImage} />
        <div style={S.shareModalBtns}>
          <button style={S.btnSec} onClick={copy} aria-label="Copy the Oakley Family Mahjong Cup link">
            {copied ? "Link copied!" : "Copy link"}
          </button>
          {canNativeShare && <button style={S.btnPri} onClick={share} aria-label="Share the Oakley Family Mahjong Cup">Share</button>}
          <button ref={closeBtnRef} style={S.btnSec} onClick={onClose}>Close</button>
        </div>
      </div>
    </div>
  );
}

  return (
    <div style={S.instrBox}>
      <Sec id="q" title="Ranking and Scoring">
        {[
          ["Players are ranked after ", <strong>3 total hands</strong>, ", including at least 1 scoring hand."],

          "Select who went out. For dead hands, see below.",

          "The winner must be one of the 4 players selected. The form will validate this.",
          "Add a note if anything interesting happened (optional).",
        ].map((text, i) => (
          <div key={i} style={S.liRow}><span style={S.liNum}>{i + 1}.</span><span>{text}</span></div>
        ))}
        <div style={S.liRow}><span style={S.liNum}>5.</span><span>Hit <strong>Submit Scores</strong>. Contact the admin to correct a submitted score or to add a new player to the roster.</span></div>
      </Sec>
      <div style={S.instrDivider} />
      <Sec id="dead" title="Dead hands">
        {[
          ["Select ", <strong>Dead hand</strong>, " from the Who went out? dropdown."],
          [<strong>Still select all 4 players</strong>, ". This is how the hand counts toward the 3-hand minimum."],
          ["Score fields are hidden automatically. Do not enter 0 for a dead hand. It would drag down your average."],
        ].map((parts, i) => (
          <div key={i} style={S.liRow}><span style={S.liBullet}>-</span><span>{parts.map((p,j) => <span key={j}>{p}</span>)}</span></div>
        ))}
      </Sec>
      <div style={S.instrDivider} />
      <Sec id="new" title="New players">
        <div style={S.liRow}><span style={S.liBullet}>-</span><span>Not on the list? Type your name in the free text field that appears when you select "+ New Player" from the dropdown.</span></div>
      </Sec>
    </div>
  );
}

function ScoreForm({ onSubmit, editHand, onCancel, knownPlayers, onDirtyChange }) {
  const blank = { name: "", score: "", isNew: false };
  const [winner, setWinner] = useState(editHand ? editHand.winner : "");
  const [winnerIsNew, setWinnerIsNew] = useState(false);
  const [winnerNewText, setWinnerNewText] = useState("");
  const [players, setPlayers] = useState(editHand ? editHand.players.map(p => ({ ...p, isNew: false })) : [{ ...blank }, { ...blank }, { ...blank }, { ...blank }]);
  const [notes, setNotes] = useState(editHand ? editHand.notes : "");
  const [errors, setErrors] = useState({});
  const isDead = winner === "Dead hand";
  const isDirty = !editHand && (
    Boolean(winner) || winnerIsNew || Boolean(winnerNewText.trim()) || Boolean(notes.trim()) ||
    players.some(p => Boolean(p.name) || Boolean(p.score) || p.isNew)
  );

  useEffect(() => {
    if (onDirtyChange) onDirtyChange(isDirty);
    return () => { if (onDirtyChange) onDirtyChange(false); };
  }, [isDirty, onDirtyChange]);

  // Merge base + known players, deduplicated and sorted
  const allKnown = [...new Set([...BASE_PLAYERS, ...knownPlayers])].sort();
  const NEW_PLAYER_SENTINEL = "__new__";

  const effectiveWinner = winnerIsNew ? winnerNewText.trim() : winner;

  const setPlayer = (i, f, v) => { const p = [...players]; p[i] = { ...p[i], [f]: v }; setPlayers(p); };
  const setPlayerNew = (i, isNew) => { const p = [...players]; p[i] = { ...p[i], isNew, name: isNew ? "" : p[i].name }; setPlayers(p); };

  const usedNames = players.map(p => p.isNew ? p.name : p.name).filter(Boolean);

  const validate = () => {
    const e = {};
    if (!effectiveWinner) e.winner = "Required";
    if (winnerIsNew && !winnerNewText.trim()) e.winner = "Please enter the player name";
    players.forEach((p, i) => {
      const name = p.isNew ? p.name.trim() : p.name;
      if (!name) e["name" + i] = "Required";
      if (p.isNew && !p.name.trim()) e["name" + i] = "Please enter the player name";
      if (!isDead && (p.score === "" || isNaN(Number(p.score)))) e["score" + i] = "Required";
    });
    const names = players.map(p => p.isNew ? p.name.trim() : p.name).filter(Boolean);
    if (new Set(names).size !== names.length) e.dup = "Players must be unique";
    const winnerName = effectiveWinner;
    if (!isDead && winnerName && winnerName !== "Dead hand") {
      const playerNames = players.map(p => p.isNew ? p.name.trim() : p.name);
      if (!playerNames.includes(winnerName)) e.winnerMatch = "Winner must be one of the 4 players";
    }
    setErrors(e);
    return Object.keys(e).length === 0;
  };

  const [submitting, setSubmitting] = useState(false);

  const handleSubmit = () => {
    if (submitting) return;
    if (!validate()) return;
    setSubmitting(true);
    onSubmit({
      winner: effectiveWinner, notes,
      players: players.map(p => ({ name: p.isNew ? p.name.trim() : p.name, score: isDead ? "X" : p.score })),
      timestamp: editHand ? editHand.timestamp : new Date().toLocaleString("sv-SE", { timeZone: "America/Los_Angeles" }).replace(" ", "T"),
      id: editHand ? editHand.id : String(Date.now()),
      rowIndex: editHand ? editHand.rowIndex : undefined,
    });
  };

  const opts = (idx) => allKnown.filter(n => !usedNames.includes(n) || n === players[idx].name);

  return (
    <div style={S.formCard}>
      <h2 style={S.formTitle}>{editHand ? "Edit Hand" : "Submit Scores"}</h2>
      {!editHand && <InstrBox />}

      <div style={S.fg}>
        <label style={S.lbl}>Who went out? <span style={S.req}>*</span></label>
        {winnerIsNew ? (
          <div style={S.newPlayerRow}>
            <input autoFocus style={S.newPlayerInput} placeholder="Enter player name" value={winnerNewText}
              onChange={e => setWinnerNewText(e.target.value)} />
            <button style={S.newPlayerCancel} onClick={() => { setWinnerIsNew(false); setWinnerNewText(""); }}>Cancel</button>
          </div>
        ) : (
          <select style={S.sel} value={winner} onChange={e => {
            if (e.target.value === NEW_PLAYER_SENTINEL) { setWinnerIsNew(true); setWinner(""); }
            else setWinner(e.target.value);
          }}>
            <option value="">Select</option>
            <option value="Dead hand">Dead hand</option>
            <optgroup label="Players">
              {allKnown.map(n => <option key={n} value={n}>{n}</option>)}
            </optgroup>
            <option value={NEW_PLAYER_SENTINEL}>+ New Player</option>
          </select>
        )}
        {errors.winner && <span style={S.err}>{errors.winner}</span>}
        {errors.winnerMatch && <span style={S.err}>{errors.winnerMatch}</span>}
      </div>

      {isDead && <div style={S.deadBanner}>Dead hand: select all 4 players below so this counts toward the 3-hand minimum. No scores needed.</div>}

      <div style={S.pgrid}>
        {players.map((p, i) => (
          <div key={i} style={S.pcell}>
            <div style={S.plbl}>Player {i + 1}</div>
            {p.isNew ? (
              <div style={S.newPlayerRow}>
                <input autoFocus style={S.newPlayerInputSm} placeholder="Enter name" value={p.name}
                  onChange={e => setPlayer(i, "name", e.target.value)} />
                <button style={S.newPlayerCancel} onClick={() => setPlayerNew(i, false)}>Cancel</button>
              </div>
            ) : (
              <select style={S.sel} value={p.name} onChange={e => {
                if (e.target.value === NEW_PLAYER_SENTINEL) setPlayerNew(i, true);
                else setPlayer(i, "name", e.target.value);
              }}>
                <option value="">Name</option>
                {opts(i).map(n => <option key={n} value={n}>{n}</option>)}
                <option value={NEW_PLAYER_SENTINEL}>+ New Player</option>
              </select>
            )}
            {errors["name" + i] && <span style={S.err}>{errors["name" + i]}</span>}
            {!isDead && (
              <div>
                <input type="number" min={0} placeholder="Score" style={S.numInput} value={p.score} onChange={e => setPlayer(i, "score", e.target.value)} />
                {errors["score" + i] && <span style={S.err}>{errors["score" + i]}</span>}
              </div>
            )}
          </div>
        ))}
      </div>
      {errors.dup && <div style={S.err}>{errors.dup}</div>}

      <div style={S.fg}>
        <label style={S.lbl}>Anything interesting? <span style={S.opt}>(optional)</span></label>
        <div style={S.hint}>e.g. last tile win, Seven Sisters, everyone was pure...</div>
        <textarea style={S.ta} value={notes} onChange={e => setNotes(e.target.value)} rows={2} />
      </div>

      <div style={S.fbtns}>
        {onCancel && <button style={S.btnSec} onClick={onCancel}>Cancel</button>}
        <button style={S.btnPri} onClick={handleSubmit} disabled={submitting}>{submitting ? "Saving..." : editHand ? "Save Changes" : "Submit Scores"}</button>
      </div>
    </div>
  );
}

function Leaderboard({ hands, season, isCurrent }) {
  const SEASON_NOTICES = {
    "2019-2020": "6 hands were excluded from this season due to incomplete data.",
  };
  const notice = SEASON_NOTICES[season] || null;
  const { ranked, notRanked } = useMemo(() => computeLeaderboard(hands), [hands]);
  const summary = useMemo(() => computeSummary(hands), [hands]);
  const pct = r => (r * 100).toFixed(0) + "%";
  const medal = r => r === 1 ? "1st" : r === 2 ? "2nd" : r === 3 ? "3rd" : "";

  return (
    <div>
      <div style={isCurrent ? S.currentSeasonBadge : S.archivedSeasonBadge}>{isCurrent ? "Current Season" : "Archived Season"}</div>
      {notice && <div style={S.seasonNotice}>{notice}</div>}

      <div style={S.sumBar}>
        {[["Ranked Players", ranked.length], ["Total Hands", summary.totalHands], ["Game Days", summary.gameDays], ["High Score", summary.highScore || "N/A"], ["Total Points", summary.totalPoints.toLocaleString()]].map(([label, value]) => (
          <div key={label} style={S.sumItem}><div style={S.sumVal}>{value}</div><div style={S.sumLbl}>{label}</div></div>
        ))}
      </div>

      <div style={S.metricsFootnote}>
        Total Hands includes dead hands. Dead hands count toward the 3-hand minimum but are excluded from Avg Score and Mahjong Rate.
      </div>

      <div style={S.rankingSummary}>
        <div style={S.rankingRule}>Combined Rank = Score Rank + Mahjong Rank. Lower is better.</div>
        <div style={S.rankingDetail}>Players are ranked after 3 total hands, including at least 1 scoring hand.</div>
      </div>

      {ranked.length === 0 && (
        <div style={S.empty}><strong>No ranked players yet.</strong> Players need 3 total hands, including at least 1 scoring hand.</div>
      )}

      {ranked.length > 0 && (
        <div style={S.tblWrap}>
          <table style={S.tbl}>
            <thead>
              <tr>
                {["Rank", "Player", "Scoring Hands", "Avg Score", "Score Rank", "Mahjong Rate", "Mahjong Rank", "Combined Rank"].map((header, i) => (
                  <th key={header} style={i === 0 ? S.thRank : i === 1 ? S.thName : S.th}>{header}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {ranked.map((p, i) => (
                <tr key={p.name} style={i % 2 === 0 ? S.trE : S.trO}>
                  <td style={S.tdR}>{medal(p.overallRank) || p.overallRank}</td>
                  <td style={S.tdN}>{p.name}</td>
                  <td style={S.td}>{p.scoringHands}</td>
                  <td style={S.td}>{p.avgScore.toFixed(0)}</td>
                  <td style={S.td}>{p.avgScoreRank}</td>
                  <td style={S.td}>{pct(p.mahjongRate)} ({p.mahjongs}/{p.scoringHands})</td>
                  <td style={S.td}>{p.mahjongRateRank}</td>
                  <td style={{ ...S.td, fontWeight: 700 }}>{p.combinedScore}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {notRanked.length > 0 && (
        <div style={S.uqSec}>
          <div style={S.uqTitle}>Not Yet Ranked</div>
          <div style={S.uqGrid}>
            {notRanked.map(p => {
              const status = p.totalHands >= 3 && p.scoringHands === 0
                ? "Needs a scoring hand"
                : p.totalHands + " of 3 hands";
              return (
                <div key={p.name} style={S.uqChip}>
                  <span style={S.uqName}>{p.name}</span>
                  <span style={S.uqHands}>{status}</span>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {isCurrent && <ShareCard />}
    </div>
  );
}

function HandHistory({ hands, onEdit, onDelete, isAdmin, onNeedPin }) {
  const [sortBy, setSortBy] = useState("date-desc");
  const [filterPlayer, setFilterPlayer] = useState("all");

  // All players who appear in any hand
  const allPlayers = [...new Set(hands.flatMap(h => h.players.map(p => p.name)).filter(Boolean))].sort();

  // Filter
  const filtered = filterPlayer === "all" ? hands : hands.filter(h => h.players.some(p => p.name === filterPlayer));

  // Sort
  const sorted = [...filtered].sort((a, b) => {
    if (sortBy === "date-desc") return new Date(b.timestamp) - new Date(a.timestamp);
    if (sortBy === "date-asc") return new Date(a.timestamp) - new Date(b.timestamp);
    if (sortBy === "winner") return a.winner.localeCompare(b.winner);
    if (sortBy === "high-score") {
      const maxScore = h => Math.max(...h.players.map(p => Number(p.score) || 0));
      return maxScore(b) - maxScore(a);
    }
    return 0;
  });

  const fmt = ts => { const d = new Date(ts); return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric", timeZone: "America/Los_Angeles" }) + " " + d.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit", timeZone: "America/Los_Angeles" }); };
  const act = fn => isAdmin ? fn() : onNeedPin(fn);

  return (
    <div>
      <div style={S.historyControls}>
        <div style={S.historyControl}>
          <label style={S.historyControlLabel}>Sort by</label>
          <select style={S.historySelect} value={sortBy} onChange={e => setSortBy(e.target.value)}>
            <option value="date-desc">Date (newest first)</option>
            <option value="date-asc">Date (oldest first)</option>
            <option value="winner">Winner (A-Z)</option>
            <option value="high-score">High score</option>
          </select>
        </div>
        <div style={S.historyControl}>
          <label style={S.historyControlLabel}>Filter by player</label>
          <select style={S.historySelect} value={filterPlayer} onChange={e => setFilterPlayer(e.target.value)}>
            <option value="all">All players</option>
            {allPlayers.map(p => <option key={p} value={p}>{p}</option>)}
          </select>
        </div>
        {filterPlayer !== "all" && (
          <div style={S.historyCount}>{sorted.length} hand{sorted.length !== 1 ? "s" : ""}</div>
        )}
      </div>

      {sorted.length === 0 && <div style={S.empty}>No hands found.</div>}
      <div style={S.hList}>
        {sorted.map(h => (
          <div key={h.id} style={S.hCard}>
            <div style={S.hHdr}>
              <div>
                <span style={S.hWinner}>{h.winner === "Dead hand" ? "Dead hand" : h.winner + " went out"}</span>
                <span style={S.hTime}>{fmt(h.timestamp)}</span>
              </div>
              <div style={S.hActs}>
                <button style={S.btnSm} onClick={() => act(() => onEdit(h))}>Edit</button>
                <button style={{ ...S.btnSm, ...S.btnDng }} onClick={() => act(() => onDelete(h))}>Delete</button>
              </div>
            </div>
            <div style={S.hPlayers}>
              {h.players.map((p, i) => (
                <div key={i} style={{ ...S.hPlayer, background: h.winner === p.name ? "#dbeafe" : "#f0f4fb", borderColor: h.winner === p.name ? "#3b82f6" : "#c8d4e8" }}>
                  <span style={S.hPName}>{p.name}</span>
                  <span style={S.hPScore}>{p.score === "X" ? "N/A" : p.score}</span>
                </div>
              ))}
            </div>
            {h.notes && <div style={S.hNotes}>Note: {h.notes}</div>}
          </div>
        ))}
      </div>
    </div>
  );
}

function App() {
  const [allHands, setAllHands] = useState([]);
  const [tab, setTab] = useState("leaderboard");
  const [season, setSeason] = useState(CURRENT_SEASON);
  const [isAdmin, setIsAdmin] = useState(false);
  const [showPin, setShowPin] = useState(false);
  const [pinCb, setPinCb] = useState(null);
  const [editing, setEditing] = useState(null);
  const [toast, setToast] = useState(null);
  const [loading, setLoading] = useState(true);
  const [syncing, setSyncing] = useState(false);
  const [lastSynced, setLastSynced] = useState(null);
  const [loadError, setLoadError] = useState(false);
  const [showShare, setShowShare] = useState(false);
  const [submitDirty, setSubmitDirty] = useState(false);
  const [pendingTab, setPendingTab] = useState(null);
  const shareTriggerRef = React.useRef(null);


  const loadData = async () => {
    try {
      setSyncing(true);
      setLoadError(false);
      const hands = await fetchAllHands();
      setAllHands(hands);
      setLastSynced(new Date());
    } catch(e) {
      setLoadError(true);
      showToast("Could not connect to database.", "err");
    } finally {
      setSyncing(false);
      setLoading(false);
    }
  };

  useEffect(() => { loadData(); }, []);
  useEffect(() => {
    if (!editing) return;
    const onKeyDown = e => { if (e.key === "Escape") setEditing(null); };
    window.addEventListener("keydown", onKeyDown);
    return () => window.removeEventListener("keydown", onKeyDown);
  }, [editing]);

  const showToast = (msg, type) => { setToast({ msg, type: type || "ok" }); setTimeout(() => setToast(null), 3000); };
  const requireAdmin = fn => { if (isAdmin) { fn(); return; } setPinCb(() => fn); setShowPin(true); };

  // Filter hands by season
  const seasonHands = allHands.filter(h => h.season === season);
  const isCurrent = season === CURRENT_SEASON;

  // Get all seasons from data
  const seasonsInData = [...new Set(allHands.map(h => h.season).filter(Boolean))];
  const seasonOrder = { "2026": 6, "2024": 5, "2023": 4, "2021": 3, "2019-2020": 2 };
  const allSeasons = [...new Set([CURRENT_SEASON, ...seasonsInData])].sort((a, b) => (seasonOrder[b] || 0) - (seasonOrder[a] || 0));
  const knownPlayers = [...new Set(allHands.flatMap(h => h.players.map(p => p.name)).filter(Boolean))].sort();

  const doSubmit = async (hand) => {
    try {
      setSyncing(true);
      await appendHand(hand, CURRENT_SEASON);
      await loadData();
      setTab("leaderboard");
      showToast("Hand recorded!");
    } catch(e) {
      showToast("Error saving hand.", "err");
    } finally {
      setSyncing(false);
    }
  };

  const doEdit = async (hand) => {
    try {
      setSyncing(true);
      await updateHand(hand, season);
      await loadData();
      setEditing(null);
      showToast("Hand updated!");
    } catch(e) {
      showToast("Error updating hand.", "err");
    } finally {
      setSyncing(false);
    }
  };

  const doDelete = async (hand) => {
    if (!confirm("Delete this hand? This cannot be undone.")) return;
    try {
      setSyncing(true);
      await deleteHand(hand.rowIndex);
      await loadData();
      showToast("Hand deleted.", "info");
    } catch(e) {
      showToast("Error deleting hand.", "err");
    } finally {
      setSyncing(false);
    }
  };


  const fmtSynced = () => {
    if (!lastSynced) return "";
    const diff = Math.floor((new Date() - lastSynced) / 60000);
    if (diff < 1) return "Leaderboard updated just now";
    return "Leaderboard updated " + diff + " min ago";
  };

  const tabs = [["leaderboard","Leaderboard"], ...(isCurrent ? [["submit","Submit Scores"]] : []), ["history","Hand History"], ["resources","Resources"]];

  const requestTabChange = nextTab => {
    if (tab === "submit" && submitDirty && nextTab !== "submit") {
      setPendingTab(nextTab);
      return;
    }
    setTab(nextTab);
  };

  const closeShare = () => {
    setShowShare(false);
    setTimeout(() => shareTriggerRef.current?.focus(), 0);
  };

  if (loading) return <div style={S.loading}>Loading...</div>;

  return (
    <div style={S.app}>
      {toast && <div style={{ ...S.toast, background: toast.type === "err" ? "#c53030" : toast.type === "info" ? "#4a5568" : "#276749" }}>{toast.msg}</div>}

      {showPin && (
        <PinModal
          onSuccess={() => { setIsAdmin(true); setShowPin(false); if (pinCb) { pinCb(); setPinCb(null); } }}
          onCancel={() => { setShowPin(false); setPinCb(null); }}
        />
      )}


      {showShare && <ShareModal onClose={closeShare} />}

      {pendingTab && (
        <LeaveFormModal
          onStay={() => setPendingTab(null)}
          onLeave={() => { const next = pendingTab; setPendingTab(null); setSubmitDirty(false); setTab(next); }}
        />
      )}

      {editing && (
        <div style={S.overlay} role="presentation" onMouseDown={e => { if (e.target === e.currentTarget) setEditing(null); }}>
          <div style={{ ...S.modal, maxWidth: 560, width: "95%", padding: 0, background: "transparent", boxShadow: "none" }} role="dialog" aria-modal="true" aria-label="Edit hand">
            <ScoreForm editHand={editing} onSubmit={doEdit} onCancel={() => setEditing(null)} knownPlayers={knownPlayers} />
          </div>
        </div>
      )}

      <div className="app-header" style={S.header}>
        <div className="app-header-inner" style={S.hdrInner}>
          <div>
            <div className="app-header-title" style={S.hdrTitle}>Oakley Family Mahjong Cup</div>
            <div style={{ marginTop: 4 }}>
              <select style={S.seasonSel} value={season} onChange={e => { setSeason(e.target.value); requestTabChange("leaderboard"); }}>
                {allSeasons.map(s => <option key={s} value={s}>{s === CURRENT_SEASON ? s + " (current)" : s}</option>)}
              </select>
            </div>
          </div>
          <div>
            {isAdmin ? (
              <div style={S.adminRow}>
                <button style={S.btnAdm} onClick={() => exportCSV(seasonHands, season)}>CSV</button>
                <span style={S.admBadge}>Admin</span>
              </div>
            ) : (
              <button style={S.btnAdmSm} onClick={() => requireAdmin(() => {})}>Admin</button>
            )}
          </div>
        </div>
      </div>

      <div className="app-tabs" style={S.tabs}>
        {tabs.map(([id, label]) => (
          <button key={id} style={tab === id ? S.tabOn : S.tabOff} onClick={() => requestTabChange(id)}>{label}</button>
        ))}
      </div>

      <div style={S.content}>
        {syncing && <div style={S.syncBar}>Syncing...</div>}
        {lastSynced && !syncing && !loadError && (
          <div style={S.syncBar}>
            {fmtSynced()}
            <button style={S.syncBtn} onClick={loadData}>Refresh</button>
          </div>
        )}
        {loadError && (
          <div style={S.loadError} role="alert">
            <div>Could not load scores.</div>
            <button style={S.btnPri} onClick={loadData}>Try again</button>
          </div>
        )}
        {tab === "leaderboard" && <Leaderboard hands={seasonHands} season={season} isCurrent={isCurrent} />}
        {tab === "submit" && isCurrent && <ScoreForm onSubmit={doSubmit} knownPlayers={knownPlayers} onDirtyChange={setSubmitDirty} />}
        {tab === "history" && <HandHistory hands={seasonHands} isAdmin={isAdmin} onEdit={h => setEditing(h)} onDelete={h => doDelete(h)} onNeedPin={fn => requireAdmin(fn)} />}
        {tab === "resources" && <Resources />}
      </div>

      <div style={S.footer}>
        <span>© {new Date().getFullYear()} Oakley Family Mahjong Cup</span>
        <span aria-hidden="true"> · </span>
        <button ref={shareTriggerRef} style={S.footerLink} onClick={() => setShowShare(true)}>Share app</button>
      </div>
    </div>
  );
}
